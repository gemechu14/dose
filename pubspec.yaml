name: chroma_inventory_pro
description: Chroma Inventory Pro – Stylist workflows for the Chroma salon platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.8.0+1
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Forms & validation
  reactive_forms: ^17.0.1
  form_validator: ^2.1.1

  # UI utilities
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  toastification: ^2.3.0
  modal_bottom_sheet: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  infinite_scroll_pagination: ^4.1.0
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11

  # Local / offline cache
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  connectivity_plus: ^6.1.4

  # Auth
  google_sign_in: ^6.2.2
  flutter_web_auth_2: ^4.0.0

  # Utils
  intl: ^0.20.0
  equatable: ^2.0.7
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  collection: ^1.19.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.3.0

  # Icons
  cupertino_icons: ^1.0.8
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
